name: Release Obsidian Plugin

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Determine version bump
        id: bump
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if echo "$LAST_MSG" | grep -qiE '^feat(\(|:|!)'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          node version-bump.mjs

      - name: Get new version
        id: version
        run: |
          echo "version=$(jq -r '.version' manifest.json)" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r '.name' manifest.json)" >> "$GITHUB_OUTPUT"

      - run: npm run build

      - name: Commit version bump
        run: |
          git add package.json manifest.json versions.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.name }} v${{ steps.version.outputs.version }}" \
            --generate-notes \
            main.js manifest.json styles.css
        env:
          GH_TOKEN: ${{ github.token }}
